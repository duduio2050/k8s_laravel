name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker insecure registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries": ["158.247.192.124:30002"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: http://158.247.192.124:30002
          username: admin
          password: Harbor12345

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            158.247.192.124:30002/laraveltest/k8s-laravel:${{ github.sha }}
            158.247.192.124:30002/laraveltest/k8s-laravel:latest
