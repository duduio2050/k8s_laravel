name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: http://158.247.192.124:30002
          username: admin
          password: Harbor12345

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: 158.247.192.124:30002/library/k8s-laravel:${{ github.sha }}
